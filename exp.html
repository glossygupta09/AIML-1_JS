<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment-3</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            /* background: linear-gradient( to bottom, #819df0, #e0e0e0); */
            background: linear-gradient(to bottom, #67adf0, #cfd5e6);

            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;

        }

        .container {
            width: 520px;
            margin: 80px auto;
            background: linear-gradient(to bottom, #ffffff, #e0e0e0);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
        }

        h1 {
            margin-bottom: 20px;
        }

        input {
            width: 70%;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 6px;
            border: 1px solid #aaa;
            font-size: 14px;
        }

        .btn {
            padding: 10px 14px;
            margin: 6px;
            border: none;
            border-radius: 6px;
            background: #1976d2;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }

        .btn:hover {
            background: #125aa0;
        }

        p {
            margin-top: 20px;
            font-size: 16px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1 id="heading">Welcome to JavaScript Lab</h1>

        <input type="text" id="textInput" placeholder="Enter new heading text">

        <br>

        <button class="btn" onclick="changeHeading()">Change Heading</button>
        <button class="btn" onclick="changeBackground()">Change Background</button>
        <button class="btn" onclick="increaseFont()">Increase Font Size</button>
        <br>
        <button class="btn" onclick="toggleParagraph()">Show/Hide Paragraph</button>
        <button class="btn" onclick="resetPage()">Reset</button>

        <p id="para">
            This is a sample paragraph. JavaScript events can dynamically change content.
        </p>
    </div>

    <script>
        let fontSize = 16;
        let colors = ["#e6e6e6", "#ffe0e0", "#e0ffe0", "#e0f0ff", "#fff4cc", "#f0e0ff", "#d9e0ff", "#e0ffe6", "#ffe0f0", "#e0f7ff"];
        let colorIndex = 0;

        function changeHeading() {
            let text = document.getElementById("textInput").value;
            if (text.trim() !== "") {
                document.getElementById("heading").textContent = text;
            }
        }

        function changeBackground() {
            colorIndex = (colorIndex + 1) % colors.length;
            document.body.style.background = colors[colorIndex];
        }

        function increaseFont() {
            fontSize += 2;
            document.getElementById("para").style.fontSize = fontSize + "px";
        }

        function toggleParagraph() {
            let p = document.getElementById("para");
            p.style.display = (p.style.display === "none") ? "block" : "none";
        }

        function resetPage() {
            document.getElementById("heading").textContent = "Welcome to JavaScript Lab";
            document.getElementById("textInput").value = "";
            document.body.style.background = "linear-gradient(to bottom, #67adf0, #cfd5e6)";
            fontSize = 16;
            document.getElementById("para").style.fontSize = "16px";
            document.getElementById("para").style.display = "block";
            colorIndex = 0;
        }
    </script>

</body>

</html>
